<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tic-Tac-toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>TIC TAC TOE</h1>
        <br><br>
        <div class="container">
            <div class="game">
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
        </div>
        </div>
        <br><br>
        <div class="messageContainer hide">
            <p id="message">Winner</p>
            <br>
            <button id="newGame">New Game</button>
        </div>
        <br>
        <button id="resetter">Reset Game</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
